<!DOCTYPE html> <html> <head> <meta charset="UTF-8"> <title>Area de trabalho - Windows 10</title><style> body{ margin:0; font-family:Segoe UI; background:url("https://wallpapercave.com/wp/wp2757874.jpg") center/cover; overflow:hidden; color:white; } #desktop{ position:absolute; width:100%; height:100%; } .desktop-icon{ position:absolute; width:80px; text-align:center; cursor:pointer; } .desktop-icon img{ width:48px; } .window{ position:absolute; background:white; color:black; border:1px solid #444; width:600px; height:400px; display:flex; flex-direction:column; box-shadow:0 10px 20px rgba(0,0,0,0.5); } .titlebar{ background:#0078d7; color:white; padding:6px; display:flex; justify-content:space-between; cursor:move; } .window-content{ flex:1; overflow:auto; padding:10px; } .resize{ position:absolute; width:12px; height:12px; right:0; bottom:0; cursor:nwse-resize; background:#666; } #taskbar{ position:fixed; bottom:0; width:100%; height:40px; background:#222; display:flex; align-items:center; } #start{ padding:6px 10px; cursor:pointer; } #taskApps{ flex:1; display:flex; } .taskapp{ padding:5px 10px; color:white; cursor:pointer; } #systemTray{ display:flex; gap:10px; padding-right:10px; } #notificationCenter{ position:fixed; right:-300px; top:0; width:300px; height:100%; background:#111; transition:0.3s; overflow:auto; } .notification{ background:#333; margin:10px; padding:10px; } .dark{ background:#111; } </style> </head> <body> <div id="desktop"></div> <div id="taskbar"> <div id="start" onclick="openStart()">🪟</div> <input id="search" placeholder="Search" oninput="searchIcons()"> <div id="taskApps"></div> <div id="systemTray"> <span id="wifi">📶</span> <span id="battery">🔋</span> <span id="clock"></span> <button onclick="toggleDark()">🌙</button> <button onclick="toggleNotifications()">🔔</button> </div> </div> <div id="notificationCenter"></div> <script> /* ---------------- Virtual Disk ---------------- */ let disk = JSON.parse(localStorage.getItem("disk")) || { Desktop:[ {name:"Chrome",type:"app"}, {name:"Explorer",type:"app"}, {name:"Terminal",type:"app"} ] }; function saveDisk(){ localStorage.setItem("disk",JSON.stringify(disk)); } /* ---------------- Desktop ---------------- */ function renderDesktop(){ let d=document.getElementById("desktop"); d.innerHTML=""; disk.Desktop.forEach((file,i)=>{ let icon=document.createElement("div"); icon.className="desktop-icon"; icon.style.left=20+"px"; icon.style.top=(20+i*90)+"px"; icon.innerHTML= "<img src='https://cdn-icons-png.flaticon.com/512/716/716784.png'><div>"+file.name+"</div>"; icon.ondblclick=()=>openFile(file); d.appendChild(icon); dragIcon(icon); }); } function openFile(file){ if(file.name=="Chrome"){ openWindow("Chrome","<iframe src='https://google.com' style='width:100%;height:100%'></iframe>"); } if(file.name=="Explorer"){ openExplorer(); } if(file.name=="Terminal"){ openTerminal(); } } /* ---------------- Window Manager ---------------- */ let z=1; function openWindow(title,content){ let win=document.createElement("div"); win.className="window"; win.style.left="120px"; win.style.top="80px"; win.style.zIndex=z++; win.innerHTML= "<div class='titlebar'>"+ title+ "<div>"+ "<button onclick='this.closest(\".window\").remove()'>X</button>"+ "</div>"+ "</div>"+ "<div class='window-content'>"+content+"</div>"+ "<div class='resize'></div>"; document.body.appendChild(win); dragWindow(win); resizeWindow(win); addTask(title,win); } /* ---------------- Drag Window ---------------- */ function dragWindow(win){ let bar=win.querySelector(".titlebar"); bar.onmousedown=e=>{ let ox=e.clientX-win.offsetLeft; let oy=e.clientY-win.offsetTop; document.onmousemove=e2=>{ win.style.left=(e2.clientX-ox)+"px"; win.style.top=(e2.clientY-oy)+"px"; }; document.onmouseup=()=>document.onmousemove=null; }; } /* ---------------- Resize ---------------- */ function resizeWindow(win){ let r=win.querySelector(".resize"); r.onmousedown=e=>{ document.onmousemove=e2=>{ win.style.width=(e2.clientX-win.offsetLeft)+"px"; win.style.height=(e2.clientY-win.offsetTop)+"px"; }; document.onmouseup=()=>document.onmousemove=null; }; } /* ---------------- Taskbar ---------------- */ function addTask(title,win){ let btn=document.createElement("div"); btn.className="taskapp"; btn.innerText=title; btn.onclick=()=>{ win.style.display="block"; }; document.getElementById("taskApps").appendChild(btn); } /* ---------------- Explorer ---------------- */ function openExplorer(){ let html="<h3>Desktop</h3>"; disk.Desktop.forEach(f=>{ html+="<div>"+f.name+"</div>"; }); openWindow("File Explorer",html); } /* ---------------- Terminal ---------------- */ let currentDir="Desktop"; function openTerminal(){ openWindow("Command Prompt", "<div id='terminalOutput'></div>"+ "<input id='cmd' placeholder='command'>" ); setTimeout(()=>{ document.getElementById("cmd") .onkeydown=e=>{ if(e.key!="Enter") return; let cmd=e.target.value; runCommand(cmd); e.target.value=""; }; },100); } function runCommand(cmd){ let out=document.getElementById("terminalOutput"); out.innerHTML+="<div>> "+cmd+"</div>"; if(cmd=="dir"){ disk[currentDir].forEach(f=>{ out.innerHTML+="<div>"+f.name+"</div>"; }); } else{ out.innerHTML+="<div>Unknown command</div>"; } } /* ---------------- Notifications ---------------- */ function notify(text){ let n=document.createElement("div"); n.className="notification"; n.innerText=text; document.getElementById("notificationCenter") prepend(n); } function toggleNotifications(){ let p=document.getElementById("notificationCenter"); p.style.right = p.style.right=="0px" ? "-300px" : "0px"; } /* ---------------- System Tray ---------------- */ setInterval(()=>{ document.getElementById("clock") .innerText=new Date().toLocaleTimeString(); },1000); navigator.getBattery().then(b=>{ function update(){ document.getElementById("battery") .innerText="🔋 "+Math.round(b.level*100)+"%"; } update(); b.onlevelchange=update; }); /* ---------------- Search ---------------- */ function searchIcons(){ let q=document.getElementById("search").value.toLowerCase(); document.querySelectorAll(".desktop-icon") .forEach(i=>{ i.style.display= i.innerText.toLowerCase().includes(q) ?"block":"none"; }); } /* ---------------- Dark Mode ---------------- */ function toggleDark(){ document.body.classList.toggle("dark"); } /* ---------------- Drag Icons ---------------- */ function dragIcon(icon){ icon.onmousedown=e=>{ let ox=e.offsetX; let oy=e.offsetY; document.onmousemove=e2=>{ icon.style.left=(e2.pageX-ox)+"px"; icon.style.top=(e2.pageY-oy)+"px"; }; document.onmouseup=()=>document.onmousemove=null; }; } /* ---------------- Boot ---------------- */ renderDesktop(); notify("Welcome to Area De Trabalho!"); </script> </body> </html>
